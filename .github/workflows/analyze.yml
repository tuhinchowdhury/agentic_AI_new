name: Run Analyzer

on:
  repository_dispatch:
    types: [run-analyzer]

jobs:
  analyze:
    name: schema-analyzer
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      # 🔹 Checkout analyzer repo
      - name: Checkout Analyzer Repo
        uses: actions/checkout@v4

      # 🔹 Checkout schema repo using PR commit SHA
      - name: Checkout Schema Repo
        uses: actions/checkout@v4
        with:
          repository: tuhinchowdhury/agentic_AI_new_bff
          ref: ${{ github.event.client_payload.ref }}
          path: schema
          fetch-depth: 0

      # 🔹 Prepare old + new schema (BASE vs PR)
      - name: Prepare Schema
        run: |
          cd schema

          BASE=${{ github.event.client_payload.base }}

          echo "Using base branch: $BASE"

          # Fetch base branch
          git fetch origin $BASE:$BASE

          echo "===== BASE SCHEMA ====="
          git show $BASE:schema.graphql > old_schema.graphql
          cat old_schema.graphql

          echo "===== PR SCHEMA ====="
          cp schema.graphql new_schema.graphql
          cat new_schema.graphql

          echo "===== DIFF ====="
          diff old_schema.graphql new_schema.graphql || true

      # 🔹 Run Analyzer
      - name: Run Analyzer
        id: analyzer
        run: |
          cd schema

          echo "===== RUNNING ANALYZER ====="

          OUTPUT=$(python ../schema_analyzer.py old_schema.graphql new_schema.graphql)

          echo "===== ANALYZER OUTPUT ====="
          echo "$OUTPUT"

          echo "ANALYZER_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$OUTPUT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Fail if breaking change
          echo "$OUTPUT" | grep "❌"
          if [ $? -eq 0 ]; then
            echo "BREAKING_CHANGE=true" >> $GITHUB_ENV
            exit 1
          else
            echo "BREAKING_CHANGE=false" >> $GITHUB_ENV
          fi

      # 🔹 Upsert PR Comment
      - name: Upsert PR Comment
        if: always()
        run: |
          COMMENT_MARKER="SCHEMA_ANALYSIS_COMMENT"
          PR_NUMBER=${{ github.event.client_payload.pr_number }}

          echo "PR NUMBER: $PR_NUMBER"

          # Skip if no PR
          if [ "$PR_NUMBER" = "0" ] || [ -z "$PR_NUMBER" ]; then
            echo "No PR context → skipping comment"
            exit 0
          fi

          # Build comment
          echo "## 🚨 Schema Impact Analysis" > body.txt
          echo "<!-- $COMMENT_MARKER -->" >> body.txt
          echo "" >> body.txt
          echo "$ANALYZER_OUTPUT" >> body.txt
          echo "" >> body.txt
          echo "---" >> body.txt
          echo "- ❌ Breaking changes block merge" >> body.txt
          echo "- ⚠️ Review warnings" >> body.txt

          # Get existing comments
          COMMENTS=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/tuhinchowdhury/agentic_AI_new_bff/issues/$PR_NUMBER/comments)

          # Fail-safe check
          if echo "$COMMENTS" | grep -q '"message"'; then
            echo "GitHub API error → skipping update"
            exit 0
          fi

          COMMENT_ID=$(echo "$COMMENTS" | jq -r \
            ".[] | select(.body | contains(\"$COMMENT_MARKER\")) | .id" | head -n 1)

          BODY_JSON=$(jq -Rs '{body: .}' < body.txt)

          if [ "$COMMENT_ID" != "" ] && [ "$COMMENT_ID" != "null" ]; then
            echo "Updating existing comment..."

            curl -X PATCH \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/tuhinchowdhury/agentic_AI_new_bff/issues/comments/$COMMENT_ID \
              -d "$BODY_JSON"

          else
            echo "Creating new comment..."

            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/tuhinchowdhury/agentic_AI_new_bff/issues/$PR_NUMBER/comments \
              -d "$BODY_JSON"
          fi